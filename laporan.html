<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Laporan Pendapatan — NetManager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#F6F5F2;--bg3:#EDECEA;
  --tx:#1a1a1a;--tx2:#707070;--tx3:#a0a0a0;
  --br:rgba(0,0,0,0.09);--br2:rgba(0,0,0,0.17);
  --red:#E50914;--red2:#c4070f;
  --green:#0F6E56;--gbg:#E1F5EE;
  --amber:#854F0B;--abg:#FAEEDA;
  --yellow:#FFF176;--yellowd:#F9A825;
  --r:8px;--rl:12px;--rxl:16px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Menlo','Monaco',monospace;
  /* sheet colors */
  --sh-header:#1a1a2e;
  --sh-col:#2d4a8a;
  --sh-row-alt:#F8F9FF;
  --sh-jumlah:#FFFDE7;
  --sh-total:#FFF9C4;
  --sh-border:#C5CAE9;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2a2a2c;--bg3:#111113;--tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#505050;--br:rgba(255,255,255,0.09);--br2:rgba(255,255,255,0.17);--sh-row-alt:#1e2035;--sh-jumlah:#2a2800;--sh-total:#2e2a00;--sh-border:#3a3f6e}
}
body{font-family:var(--f);background:var(--bg3);color:var(--tx);min-height:100vh}
.scr{display:none}.scr.on{display:block}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.lb{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rxl);padding:2rem 1.75rem 1.5rem;width:100%;max-width:300px;text-align:center}
.logon{width:48px;height:48px;background:var(--red);border-radius:12px;margin:0 auto .85rem;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700}
.lt{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:.2rem}
.ls{font-size:13px;color:var(--tx2);margin-bottom:1.5rem;line-height:1.45}
.dots{display:flex;gap:14px;justify-content:center;margin-bottom:1.5rem}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--br2);transition:all .12s}
.dot.on{background:var(--red);border-color:var(--red)}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.dot.sh{animation:sh .3s}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.6rem}
.nk{padding:14px;border-radius:var(--r);border:0.5px solid var(--br);background:var(--bg2);font-family:var(--f);font-size:18px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .12s}
.nk:active{transform:scale(.93)}
.nk.del{font-size:14px;color:var(--tx2)}
.nk.blank{border:none;background:transparent;pointer-events:none}
.perr{font-size:12px;color:#A32D2D;min-height:18px;margin-top:.35rem}
.phint{font-size:12px;color:var(--tx3);margin-top:.5rem;line-height:1.4}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--br);height:52px;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:600;color:var(--tx)}
.brand-ico{width:26px;height:26px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.brand-sub{font-size:12px;color:var(--tx2);font-weight:400}
.topright{display:flex;align-items:center;gap:6px}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3);background:var(--bg2);padding:4px 9px;border-radius:20px;border:0.5px solid var(--br)}
.sdot{width:6px;height:6px;border-radius:50%;background:#639922;flex-shrink:0}
.sdot.sync{background:#EF9F27;animation:pulse 1s infinite}
.sdot.err{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{width:34px;height:34px;border:0.5px solid var(--br);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx2)}
.icon-btn:active{background:var(--bg2)}

/* NAV */
.wrap{padding:1rem;max-width:1400px;margin:0 auto}

/* month nav */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap}
.month-label{font-size:18px;font-weight:700;color:var(--tx);flex:1;text-align:center}
.mnav-btn{width:36px;height:36px;border:0.5px solid var(--br2);border-radius:var(--r);background:var(--bg);cursor:pointer;font-size:16px;color:var(--tx2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mnav-btn:active{background:var(--bg2)}
.month-select-wrap{display:flex;gap:6px;align-items:center}
.msel{padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);font-family:var(--f);font-size:13px;color:var(--tx);cursor:pointer}
.msel:focus{outline:none;border-color:var(--red)}

/* summary cards */
.sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem}
.sc{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--r);padding:.7rem 1rem}
.sc-l{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sc-v{font-size:18px;font-weight:700;color:var(--tx);line-height:1}
.sc-v.green{color:var(--green)}
.sc-v.red{color:#A32D2D}
.sc-v.amber{color:var(--amber)}

/* harga config */
.config-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;background:var(--bg);border:0.5px solid var(--br);border-radius:var(--r);padding:.65rem 1rem}
.config-lbl{font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap}
.config-input{padding:5px 9px;border-radius:6px;border:0.5px solid var(--br2);font-family:var(--f);font-size:13px;color:var(--tx);background:var(--bg);width:130px}
.config-input:focus{outline:none;border-color:var(--red)}
.config-sep{width:1px;height:20px;background:var(--br2);margin:0 4px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--sh-border);background:var(--bg)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:820px}
thead tr:first-child th{background:#E53935;color:#fff;font-size:13px;font-weight:700;text-align:center;padding:8px 6px;border:1px solid rgba(255,255,255,0.2)}
thead tr:nth-child(2) th{background:#1565C0;color:#fff;font-weight:700;text-align:center;padding:6px 5px;border:1px solid rgba(255,255,255,0.2);font-size:11px;white-space:nowrap}
tbody tr{transition:background .1s}
tbody tr:nth-child(even){background:var(--sh-row-alt)}
tbody tr:hover{background:#EEF2FF}
@media(prefers-color-scheme:dark){tbody tr:hover{background:#1e2240}}
td{padding:5px 6px;border:0.5px solid var(--sh-border);vertical-align:middle;color:var(--tx)}
td.tanggal{font-weight:500;font-size:11px;white-space:nowrap;min-width:120px}
td.center{text-align:center}
td.right{text-align:right}
td.num{text-align:center;font-weight:600;color:#1565C0}
td.rp{text-align:right;font-family:var(--mono);font-size:11px;color:var(--tx)}
td.rp.has-val{color:var(--green);font-weight:600}
td.rp.penarikan{color:#A32D2D;font-weight:600}
td.rp.admin{color:var(--amber);font-weight:600}
tr.jumlah-row td{background:var(--sh-jumlah);font-weight:700;border-top:2px solid #F9A825}
tr.total-row td{background:var(--sh-total);font-weight:700;border-top:2px solid #F57F17;font-size:12px}
tr.total-row td.total-label{font-size:11px;color:var(--tx2)}
tr.total-row td.total-val{font-size:14px;font-weight:700}
tr.total-row td.total-val.green{color:var(--green)}
tr.total-row td.total-val.red{color:#A32D2D}

/* editable cell */
td.editable{cursor:pointer;position:relative}
td.editable:hover::after{content:'✏';position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:9px;opacity:.4}
.cell-input{width:100%;border:none;background:transparent;font-family:var(--mono);font-size:11px;color:var(--green);font-weight:600;text-align:center;padding:0;outline:none}
.cell-input.rp-input{text-align:right}
.cell-input::placeholder{color:var(--tx3);font-weight:400}

/* weekend row */
tr.weekend td{background:#FFF8E1}
tr.weekend td.tanggal{color:#795548}
@media(prefers-color-scheme:dark){tr.weekend td{background:#1a1500}}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200}
@media(min-width:640px){.overlay{align-items:center;padding:1rem}}
.modal{background:var(--bg);border-radius:var(--rxl) var(--rxl) 0 0;padding:1.35rem 1.25rem 1.75rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:var(--rxl);padding-bottom:1.35rem}}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.mtitle{font-size:15px;font-weight:600;color:var(--tx)}
.xcl{width:28px;height:28px;border:none;background:var(--bg2);border-radius:7px;cursor:pointer;font-size:14px;color:var(--tx2);display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:.85rem}
.flbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block}
.finput{width:100%;padding:10px 11px;border-radius:var(--r);border:0.5px solid var(--br2);font-family:var(--f);font-size:14px;color:var(--tx);background:var(--bg)}
.finput:focus{outline:none;border-color:var(--red)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:1.1rem}
.mbtn{padding:10px 20px;border-radius:var(--r);border:0.5px solid var(--br2);background:transparent;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;color:var(--tx)}
.mbtn:active{background:var(--bg2)}
.mbtn.red{background:var(--red);border-color:var(--red);color:#fff}
.note{font-size:12px;color:var(--tx2);background:var(--bg2);border-radius:var(--r);padding:.65rem .9rem;line-height:1.5;margin-bottom:.85rem}
.note strong{color:var(--tx)}

/* det info row */
.det-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--br);font-size:14px;gap:8px}
.det-row:last-child{border-bottom:none}
.det-l{color:var(--tx2)}
.det-v{font-weight:600;color:var(--tx);text-align:right}

/* toast */
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%);padding:.6rem 1.4rem;background:#0F6E56;color:#fff;font-size:13px;font-weight:600;border-radius:20px;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:.75rem;color:var(--tx2);font-size:14px}
.spinner{width:24px;height:24px;border:2.5px solid var(--br2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* export btn */
.export-btn{padding:7px 13px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);font-family:var(--f);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:5px}
.export-btn:active{background:var(--bg2)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="scr on">
  <div class="lw">
    <div class="lb">
      <div class="logon">N</div>
      <div class="lt" id="lt">Masukkan PIN</div>
      <div class="ls" id="ls">Akses laporan pendapatan</div>
      <div class="dots">
        <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      </div>
      <div class="numpad">
        <button class="nk" onclick="pk('1')">1</button><button class="nk" onclick="pk('2')">2</button><button class="nk" onclick="pk('3')">3</button>
        <button class="nk" onclick="pk('4')">4</button><button class="nk" onclick="pk('5')">5</button><button class="nk" onclick="pk('6')">6</button>
        <button class="nk" onclick="pk('7')">7</button><button class="nk" onclick="pk('8')">8</button><button class="nk" onclick="pk('9')">9</button>
        <div class="nk blank"></div><button class="nk" onclick="pk('0')">0</button><button class="nk del" onclick="pd()">&#9003;</button>
      </div>
      <div class="perr" id="perr"></div>
      <div class="phint" id="phint"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="s-main" class="scr">
  <div class="topbar">
    <div class="brand">
      <div class="brand-ico">N</div>
      <div>
        <div>NetManager</div>
        <div class="brand-sub">Laporan Pendapatan</div>
      </div>
    </div>
    <div class="topright">
      <div class="sync-pill"><div class="sdot" id="sdot"></div><span id="slbl">...</span></div>
      <button class="icon-btn" onclick="openConfig()" title="Pengaturan Harga">&#9881;</button>
      <button class="icon-btn" onclick="lockApp()" title="Kunci">&#128274;</button>
    </div>
  </div>

  <div class="wrap">
    <!-- Month navigation -->
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-select-wrap">
        <select class="msel" id="sel-month" onchange="onMonthChange()">
          <option value="0">Januari</option><option value="1">Februari</option>
          <option value="2">Maret</option><option value="3">April</option>
          <option value="4">Mei</option><option value="5">Juni</option>
          <option value="6">Juli</option><option value="7">Agustus</option>
          <option value="8">September</option><option value="9">Oktober</option>
          <option value="10">November</option><option value="11">Desember</option>
        </select>
        <select class="msel" id="sel-year" onchange="onMonthChange()"></select>
      </div>
      <button class="mnav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>

    <!-- Summary cards -->
    <div class="sum-row" id="summary"></div>

    <!-- Table -->
    <div class="tbl-wrap">
      <div class="loading" id="loading"><div class="spinner"></div>Memuat data...</div>
      <table id="main-table" style="display:none">
        <thead>
          <tr>
            <th colspan="9" id="thead-title">Maret 2026</th>
          </tr>
          <tr>
            <th style="min-width:120px">Tanggal</th>
            <th style="min-width:60px">Akun 55<br><span style="font-size:10px;opacity:.8">Terjual</span></th>
            <th style="min-width:110px">Pembelian<br><span style="font-size:10px;opacity:.8">Akun 55</span></th>
            <th style="min-width:60px">Akun 66<br><span style="font-size:10px;opacity:.8">Terjual</span></th>
            <th style="min-width:110px">Pembelian<br><span style="font-size:10px;opacity:.8">Akun 66</span></th>
            <th style="min-width:110px">Total<br><span style="font-size:10px;opacity:.8">Pemasukan</span></th>
            <th style="min-width:110px">Penarikan</th>
            <th style="min-width:110px">Admin</th>
            <th style="min-width:110px">Catatan</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Formula note -->
    <div style="font-size:11px;color:var(--tx3);text-align:center;margin-top:.6rem;padding:.4rem">
      Total Bersih = Total Pemasukan − Penarikan − Admin
    </div>
  </div>
</div>

<div id="mhost"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/firebase/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCifHEDd3iHUAxSd8PkBj02LAf-Z-f21BU",
  authDomain:"netflix-manager-c1fcd.firebaseapp.com",
  databaseURL:"https://netflix-manager-c1fcd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"netflix-manager-c1fcd",
  storageBucket:"netflix-manager-c1fcd.firebasestorage.app",
  messagingSenderId:"670235211618",
  appId:"1:670235211618:web:65b6f66de2a1e9e20a9e3b"
});
const db = firebase.database();

// ── State ──────────────────────────────────────────────────────
let pinBuf='', setupPhase=0, pendingPin='';
let curYear=new Date().getFullYear(), curMonth=new Date().getMonth();
let monthData={};   // { "1": {a55:2, p55:110000, a66:0, p66:0, penarikan:0, admin:0, catatan:""}, ... }
let config={harga55:55000, harga66:55000};
let dbListener=null;

const BULAN=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

// ── Helpers ────────────────────────────────────────────────────
function fmtRp(n){ if(!n||n===0) return 'Rp0'; return 'Rp'+Math.round(n).toLocaleString('id-ID'); }
function parseRp(s){ return parseInt(String(s).replace(/[^0-9]/g,''))||0; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function isWeekend(y,m,d){ const day=new Date(y,m,d).getDay(); return day===0||day===6; }
function dbKey(){ return `laporan/${curYear}/${pad2(curMonth+1)}`; }
function pad2(n){ return String(n).padStart(2,'0'); }

// ── Sync UI ────────────────────────────────────────────────────
function ssUI(s,l){ const d=document.getElementById('sdot'),lb=document.getElementById('slbl'); if(!d)return; d.className='sdot'+(s==='sync'?' sync':s==='err'?' err':''); lb.textContent=l; }

// ── Firebase ──────────────────────────────────────────────────
function loadMonth(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('main-table').style.display='none';
  if(dbListener){ db.ref(dbKey()).off('value',dbListener); dbListener=null; }
  ssUI('sync','Memuat...');
  dbListener=db.ref(dbKey()).on('value', snap=>{
    monthData=snap.val()||{};
    ssUI('ok','Real-time');
    renderTable();
  }, ()=>ssUI('err','Gagal'));

  // load config
  db.ref('config/laporan').once('value').then(snap=>{ if(snap.val()) Object.assign(config,snap.val()); });
}

function saveCell(day, field, val){
  ssUI('sync','Menyimpan...');
  db.ref(`${dbKey()}/${day}/${field}`).set(val).then(()=>ssUI('ok','Real-time'));
}

// ── Login PIN (shared with NetManager) ───────────────────────
async function initPIN(){
  ssUI('sync','Menghubungkan...');
  try{
    const s=await db.ref('config/pin').once('value');
    if(!s.val()){ setupPhase=1; setLUI('Buat PIN Tim','Dibuat sekali, berlaku untuk semua halaman','PIN ini dipakai bersama NetManager'); }
    else{ setupPhase=0; setLUI('Masukkan PIN','Masukkan PIN 4 digit tim kamu',''); }
    ssUI('ok','Tersambung');
  }catch(e){ ssUI('err','Gagal'); setLUI('Koneksi gagal','Periksa internet lalu refresh',''); }
}
function setLUI(t,s,h){ document.getElementById('lt').textContent=t; document.getElementById('ls').textContent=s; document.getElementById('phint').innerHTML=h?`<strong>${h}</strong>`:''; }
function pk(k){ if(pinBuf.length>=4)return; pinBuf+=k; ud(); if(pinBuf.length===4)setTimeout(subPIN,130); }
function pd(){ pinBuf=pinBuf.slice(0,-1); ud(); document.getElementById('perr').textContent=''; }
function ud(){ for(let i=0;i<4;i++) document.getElementById('d'+i).className='dot'+(i<pinBuf.length?' on':''); }
async function subPIN(){
  if(setupPhase===1){ pendingPin=pinBuf; pinBuf=''; ud(); setupPhase=2; setLUI('Konfirmasi PIN','Masukkan PIN yang sama lagi',''); return; }
  if(setupPhase===2){
    if(pinBuf===pendingPin){ await db.ref('config/pin').set(pinBuf); enterApp(); }
    else{ setupPhase=1; pendingPin=''; pinBuf=''; ud(); pinErr('PIN tidak cocok, ulangi'); setLUI('Buat PIN Tim','PIN tidak cocok, ulangi dari awal',''); }
    return;
  }
  try{ const s=await db.ref('config/pin').once('value'); if(s.val()===pinBuf) enterApp(); else{ pinBuf=''; ud(); pinErr('PIN salah'); } }
  catch(e){ pinBuf=''; ud(); pinErr('Gagal, coba lagi'); }
}
function pinErr(m){ document.getElementById('perr').textContent=m; document.querySelectorAll('.dot').forEach(d=>{d.classList.add('sh');setTimeout(()=>d.classList.remove('sh'),350)}); }
function enterApp(){
  document.getElementById('s-login').classList.remove('on');
  document.getElementById('s-main').classList.add('on');
  initYearSelect();
  document.getElementById('sel-month').value=curMonth;
  loadMonth();
}
function lockApp(){ pinBuf='';pendingPin='';setupPhase=0;ud(); document.getElementById('perr').textContent=''; document.getElementById('s-main').classList.remove('on'); document.getElementById('s-login').classList.add('on'); setLUI('Masukkan PIN','Akses laporan pendapatan',''); closeM(); }

// ── Year select ───────────────────────────────────────────────
function initYearSelect(){
  const sel=document.getElementById('sel-year');
  sel.innerHTML='';
  for(let y=2025;y<=2030;y++){
    const o=document.createElement('option'); o.value=y; o.textContent=y;
    if(y===curYear) o.selected=true;
    sel.appendChild(o);
  }
}

function changeMonth(d){
  curMonth+=d;
  if(curMonth<0){ curMonth=11; curYear--; }
  if(curMonth>11){ curMonth=0; curYear++; }
  document.getElementById('sel-month').value=curMonth;
  document.getElementById('sel-year').value=curYear;
  loadMonth();
}
function onMonthChange(){
  curMonth=parseInt(document.getElementById('sel-month').value);
  curYear=parseInt(document.getElementById('sel-year').value);
  loadMonth();
}

// ── Render ────────────────────────────────────────────────────
function renderTable(){
  const days=daysInMonth(curYear,curMonth);
  document.getElementById('thead-title').textContent=`${BULAN[curMonth]} ${curYear}`;

  let totA55=0,totP55=0,totA66=0,totP66=0,totPemasukan=0,totPenarikan=0,totAdmin=0;

  const rows=[];
  for(let d=1;d<=days;d++){
    const dd=pad2(d);
    const row=monthData[d]||monthData[dd]||{};
    const a55=row.a55||0;
    const p55=row.p55!==undefined?row.p55:(a55*config.harga55);
    const a66=row.a66||0;
    const p66=row.p66!==undefined?row.p66:(a66*config.harga66);
    const penarikan=row.penarikan||0;
    const admin=row.admin||0;
    const catatan=row.catatan||'';
    const totalHari=p55+p66;

    totA55+=a55; totP55+=p55; totA66+=a66; totP66+=p66;
    totPemasukan+=totalHari; totPenarikan+=penarikan; totAdmin+=admin;

    const isWE=isWeekend(curYear,curMonth,d);
    const hariNama=HARI[new Date(curYear,curMonth,d).getDay()];
    const tanggalStr=`${hariNama}, ${pad2(d)} ${BULAN[curMonth]} ${curYear}`;

    rows.push(`<tr class="${isWE?'weekend':''}">
      <td class="tanggal">${tanggalStr}</td>
      <td class="num editable" onclick="editCell(${d},'a55',this)">${a55||''}</td>
      <td class="rp editable ${p55?'has-val':''}" onclick="editCell(${d},'p55',this)">${p55?fmtRp(p55):'Rp0'}</td>
      <td class="num editable" onclick="editCell(${d},'a66',this)">${a66||''}</td>
      <td class="rp editable ${p66?'has-val':''}" onclick="editCell(${d},'p66',this)">${p66?fmtRp(p66):'Rp0'}</td>
      <td class="rp ${totalHari?'has-val':''}">${fmtRp(totalHari)}</td>
      <td class="rp editable ${penarikan?'penarikan':''}" onclick="editRp(${d},'penarikan',this)">${penarikan?fmtRp(penarikan):'Rp0'}</td>
      <td class="rp editable ${admin?'admin':''}" onclick="editRp(${d},'admin',this)">${admin?fmtRp(admin):'Rp0'}</td>
      <td class="editable" onclick="editCatatan(${d},'catatan',this)" style="font-size:11px;color:var(--tx2);min-width:100px">${catatan||''}</td>
    </tr>`);
  }

  const totalBersih=totPemasukan-totPenarikan-totAdmin;

  rows.push(`<tr class="jumlah-row">
    <td class="tanggal">JUMLAH</td>
    <td class="num">${totA55}</td>
    <td class="rp">${fmtRp(totP55)}</td>
    <td class="num">${totA66}</td>
    <td class="rp">${fmtRp(totP66)}</td>
    <td class="rp has-val">${fmtRp(totPemasukan)}</td>
    <td class="rp penarikan">${totPenarikan?fmtRp(totPenarikan):'Rp0'}</td>
    <td class="rp admin">${totAdmin?fmtRp(totAdmin):'Rp0'}</td>
    <td></td>
  </tr>`);

  rows.push(`<tr class="total-row">
    <td colspan="4" class="total-label">TOTAL BERSIH = Pemasukan − Penarikan − Admin</td>
    <td colspan="5" class="total-val ${totalBersih>=0?'green':'red'}">${fmtRp(totalBersih)}</td>
  </tr>`);

  document.getElementById('tbody').innerHTML=rows.join('');
  document.getElementById('loading').style.display='none';
  document.getElementById('main-table').style.display='';

  renderSummary(totA55,totA66,totPemasukan,totPenarikan,totAdmin,totalBersih);
}

function renderSummary(a55,a66,masuk,penarikan,admin,bersih){
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sc-l">Terjual Akun 55</div><div class="sc-v">${a55} slot</div></div>
    <div class="sc"><div class="sc-l">Terjual Akun 66</div><div class="sc-v">${a66} slot</div></div>
    <div class="sc"><div class="sc-l">Total Pemasukan</div><div class="sc-v green">${fmtRp(masuk)}</div></div>
    <div class="sc"><div class="sc-l">Penarikan</div><div class="sc-v red">${fmtRp(penarikan)}</div></div>
    <div class="sc"><div class="sc-l">Admin</div><div class="sc-v amber">${fmtRp(admin)}</div></div>
    <div class="sc"><div class="sc-l">Total Bersih</div><div class="sc-v ${bersih>=0?'green':'red'}">${fmtRp(bersih)}</div></div>`;
}

// ── Inline edit ───────────────────────────────────────────────
function editCell(day, field, td){
  const cur=monthData[day]&&monthData[day][field]!==undefined?monthData[day][field]:'';
  const inp=document.createElement('input');
  inp.type='number'; inp.min='0'; inp.className='cell-input';
  inp.value=cur||''; inp.placeholder='0';
  td.innerHTML=''; td.appendChild(inp);
  inp.focus(); inp.select();

  function save(){
    const val=parseInt(inp.value)||0;
    let updates={};
    updates[field]=val;
    // auto-calc pembelian jika belum pernah diset manual
    if(field==='a55'){ const existing=monthData[day]&&monthData[day].p55_manual; if(!existing) updates.p55=val*config.harga55; }
    if(field==='a66'){ const existing=monthData[day]&&monthData[day].p66_manual; if(!existing) updates.p66=val*config.harga66; }
    db.ref(`${dbKey()}/${day}`).update(updates);
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();save();inp.blur();} if(e.key==='Escape'){inp.blur();renderTable();} });
}

function editRp(day, field, td){
  const row=monthData[day]||{};
  const cur=row[field]||0;
  const inp=document.createElement('input');
  inp.type='number'; inp.min='0'; inp.className='cell-input rp-input';
  inp.value=cur||''; inp.placeholder='0';
  td.innerHTML=''; td.appendChild(inp);
  inp.focus(); inp.select();

  function save(){
    const val=parseInt(inp.value)||0;
    db.ref(`${dbKey()}/${day}/${field}`).set(val);
    if(field==='p55'||field==='p66') db.ref(`${dbKey()}/${day}/${field}_manual`).set(true);
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();save();inp.blur();} if(e.key==='Escape'){inp.blur();renderTable();} });
}

function editCatatan(day, field, td){
  const row=monthData[day]||{};
  const cur=row[field]||'';
  const inp=document.createElement('input');
  inp.type='text'; inp.className='cell-input';
  inp.style.fontFamily='var(--f)'; inp.style.fontSize='11px'; inp.style.color='var(--tx2)';
  inp.value=cur; inp.placeholder='Catatan...';
  td.innerHTML=''; td.appendChild(inp);
  inp.focus(); inp.select();

  function save(){ db.ref(`${dbKey()}/${day}/${field}`).set(inp.value.trim()||''); }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();save();inp.blur();} if(e.key==='Escape'){inp.blur();renderTable();} });
}

  db.ref('config/laporan').set(config);
  closeM(); toast('Harga slot diperbarui'); renderTable();
}

function openM(html){ document.getElementById('mhost').innerHTML=`<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeM()">${html}</div>`; }
function closeM(){ document.getElementById('mhost').innerHTML=''; }

function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }

initPIN();
