<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NetManager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#F6F5F2;--bg3:#EDECEA;
  --tx:#1a1a1a;--tx2:#707070;--tx3:#a0a0a0;
  --br:rgba(0,0,0,0.09);--br2:rgba(0,0,0,0.17);
  --red:#E50914;--red2:#c4070f;
  --green:#0F6E56;--gbg:#E1F5EE;
  --amber:#854F0B;--abg:#FAEEDA;
  --r:8px;--rl:12px;--rxl:16px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Menlo','Monaco',monospace;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2a2a2c;--bg3:#111113;--tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#505050;--br:rgba(255,255,255,0.09);--br2:rgba(255,255,255,0.17)}
  .bok{background:#085041!important;color:#9FE1CB!important}
  .bexp{background:#791F1F!important;color:#F7C1C1!important}
  .bmt{background:#333!important;color:#aaa!important}
  .slot-item.on{background:#0d2a45!important;border-color:#378ADD!important}
  .slot-item.on .slot-lbl{color:#B5D4F4!important}
}
body{font-family:var(--f);background:var(--bg3);color:var(--tx);min-height:100vh}
.scr{display:none}.scr.on{display:block}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.lb{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rxl);padding:2rem 1.75rem 1.5rem;width:100%;max-width:300px;text-align:center}
.logon{width:48px;height:48px;background:var(--red);border-radius:12px;margin:0 auto .85rem;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700}
.lt{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:.2rem}
.ls{font-size:13px;color:var(--tx2);margin-bottom:1.5rem;line-height:1.45}
.dots{display:flex;gap:14px;justify-content:center;margin-bottom:1.5rem}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--br2);transition:all .12s}
.dot.on{background:var(--red);border-color:var(--red)}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.dot.sh{animation:sh .3s}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.6rem}
.nk{padding:14px;border-radius:var(--r);border:0.5px solid var(--br);background:var(--bg2);font-family:var(--f);font-size:18px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .12s}
.nk:active{transform:scale(.93)}
.nk.del{font-size:14px;color:var(--tx2)}
.nk.blank{border:none;background:transparent;pointer-events:none}
.perr{font-size:12px;color:#A32D2D;min-height:18px;margin-top:.35rem}
.phint{font-size:12px;color:var(--tx3);margin-top:.5rem;line-height:1.4}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--br);height:52px;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:600;color:var(--tx)}
.brand-ico{width:26px;height:26px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.topright{display:flex;align-items:center;gap:6px}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3);background:var(--bg2);padding:4px 9px;border-radius:20px;border:0.5px solid var(--br)}
.sdot{width:6px;height:6px;border-radius:50%;background:#639922;flex-shrink:0}
.sdot.sync{background:#EF9F27;animation:pulse 1s infinite}
.sdot.err{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{width:34px;height:34px;border:0.5px solid var(--br);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx2)}
.icon-btn:active{background:var(--bg2)}
.add-btn{padding:7px 13px;border-radius:var(--r);border:none;background:var(--red);color:#fff;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:active{background:var(--red2)}

/* MAIN */
.wrap{padding:1rem;max-width:1200px;margin:0 auto}
.sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:1rem}
.sc{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--r);padding:.6rem .85rem}
.sc-l{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sc-v{font-size:22px;font-weight:600;color:var(--tx);line-height:1}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.ftab{padding:6px 16px;border-radius:20px;border:0.5px solid var(--br2);background:transparent;font-family:var(--f);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.ftab.on{background:var(--red);border-color:var(--red);color:#fff}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
@media(max-width:640px){.cards{grid-template-columns:1fr}}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2);font-size:14px}

/* ACCOUNT CARD */
.acard{background:var(--bg);border:0.5px solid var(--br);border-radius:var(--rl);overflow:hidden}
.acard.expb{border-left:3px solid #E24B4A;border-radius:0 var(--rl) var(--rl) 0}
.card-top{padding:.9rem 1rem .8rem}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.card-id{font-size:11px;font-weight:600;color:var(--tx2)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;gap:4px}
.bok{background:var(--gbg);color:var(--green)}
.bexp{background:#FCEBEB;color:#A32D2D}
.bmt{background:#F1EFE8;color:#5F5E5A}

/* masa aktif strip */
.ma-strip{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:var(--r);padding:.5rem .75rem;margin-bottom:.7rem;gap:.5rem;flex-wrap:wrap}
.ma-l{font-size:11px;color:var(--tx2);flex-shrink:0}
.ma-v{font-size:12px;font-weight:600;color:var(--tx);text-align:right}
.ma-v.red{color:#A32D2D}.ma-v.amber{color:var(--amber)}.ma-v.green{color:var(--green)}

/* credentials */
.cred{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.cred-t{font-size:13px;font-weight:500;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cred-m{font-family:var(--mono);font-size:12px}
.eye-btn{flex-shrink:0;width:26px;height:26px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--tx3);display:flex;align-items:center;justify-content:center}

/* ONE-CLICK COPY */
.copy-btn{width:100%;margin-top:.7rem;padding:10px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg2);font-family:var(--f);font-size:13px;font-weight:600;color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.copy-btn:active{background:var(--bg3)}
.copy-btn.ok{background:var(--gbg);border-color:#5DCAA5;color:var(--green)}

/* slot toggle bar */
.slot-toggle{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-top:0.5px solid var(--br);cursor:pointer;user-select:none}
.slot-toggle:active{background:var(--bg2)}
.stog-l{display:flex;align-items:center;gap:.65rem}
.mini-bars{display:flex;gap:2px;align-items:flex-end;height:14px}
.mini-bar{width:5px;border-radius:2px;transition:all .2s}
.stog-info{}
.stog-t{font-size:13px;font-weight:600;color:var(--tx)}
.stog-s{font-size:11px;color:var(--tx2)}
.chevron{font-size:11px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

/* slot panel */
.slot-panel{display:none;border-top:0.5px solid var(--br);padding:.85rem 1rem}
.slot-panel.open{display:block}
.slot-sep{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin:.55rem 0 .4rem}
.slot-sep:first-child{margin-top:0}
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.slot-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:.6rem .3rem;border-radius:var(--r);border:0.5px solid var(--br);background:var(--bg2);cursor:pointer;transition:all .15s;user-select:none}
.slot-item:active{transform:scale(.94)}
.slot-item.on{background:#EBF4FF;border-color:#85B7EB}
.slot-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--br2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.slot-item.on .slot-check{background:#378ADD;border-color:#378ADD;color:#fff}
.slot-lbl{font-size:10px;font-weight:600;color:var(--tx2)}
.slot-item.on .slot-lbl{color:#0C447C}

/* card bottom actions */
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:.75rem 1rem;border-top:0.5px solid var(--br);background:var(--bg2)}
.act{padding:9px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg);font-family:var(--f);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;text-align:center}
.act:active{background:var(--bg3)}
.act.red{background:var(--red);border-color:var(--red);color:#fff}
.act.red:active{background:var(--red2)}

/* MODALS — sheet on mobile, centered on desktop */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200}
@media(min-width:640px){.overlay{align-items:center;padding:1rem}}
.modal{background:var(--bg);border-radius:var(--rxl) var(--rxl) 0 0;padding:1.35rem 1.25rem 1.75rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:var(--rxl);padding-bottom:1.35rem}}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.mtitle{font-size:15px;font-weight:600;color:var(--tx)}
.xcl{width:28px;height:28px;border:none;background:var(--bg2);border-radius:7px;cursor:pointer;font-size:14px;color:var(--tx2);display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:.85rem}
.flbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block}
.finput{width:100%;padding:10px 11px;border-radius:var(--r);border:0.5px solid var(--br2);font-family:var(--f);font-size:14px;color:var(--tx);background:var(--bg)}
.finput:focus{outline:none;border-color:var(--red)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:1.1rem}
.mbtn{padding:10px 20px;border-radius:var(--r);border:0.5px solid var(--br2);background:transparent;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;color:var(--tx)}
.mbtn:active{background:var(--bg2)}
.mbtn.red{background:var(--red);border-color:var(--red);color:#fff}
.mbtn.danger{border-color:#E24B4A;color:#A32D2D}

/* detail rows */
.det-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--br);font-size:14px;gap:8px}
.det-row:last-child{border-bottom:none}
.det-l{color:var(--tx2);flex-shrink:0}
.det-v{font-weight:600;color:var(--tx);text-align:right;word-break:break-all}
.det-v.mono{font-family:var(--mono);font-size:13px}

/* message preview */
.msg-box{background:var(--bg2);border-radius:var(--r);padding:.9rem 1rem;font-size:13px;color:var(--tx);line-height:1.65;border:0.5px solid var(--br);white-space:pre-wrap;word-break:break-word;margin-bottom:.75rem;font-family:var(--mono)}
.copy-msg{width:100%;padding:10px;border-radius:var(--r);border:0.5px solid var(--br2);background:var(--bg2);font-family:var(--f);font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;text-align:center}
.copy-msg.ok{background:var(--gbg);border-color:#5DCAA5;color:var(--green)}

.note{font-size:12px;color:var(--tx2);background:var(--bg2);border-radius:var(--r);padding:.65rem .9rem;line-height:1.5;margin-bottom:.75rem}
.note strong{color:var(--tx)}

/* toast */
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%);padding:.6rem 1.4rem;background:#0F6E56;color:#fff;font-size:13px;font-weight:600;border-radius:20px;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="s-login" class="scr on">
  <div class="lw">
    <div class="lb">
      <div class="logon">N</div>
      <div class="lt" id="lt">Masukkan PIN</div>
      <div class="ls" id="ls">Masukkan PIN 4 digit tim kamu</div>
      <div class="dots">
        <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      </div>
      <div class="numpad">
        <button class="nk" onclick="pk('1')">1</button><button class="nk" onclick="pk('2')">2</button><button class="nk" onclick="pk('3')">3</button>
        <button class="nk" onclick="pk('4')">4</button><button class="nk" onclick="pk('5')">5</button><button class="nk" onclick="pk('6')">6</button>
        <button class="nk" onclick="pk('7')">7</button><button class="nk" onclick="pk('8')">8</button><button class="nk" onclick="pk('9')">9</button>
        <div class="nk blank"></div><button class="nk" onclick="pk('0')">0</button><button class="nk del" onclick="pd()">&#9003;</button>
      </div>
      <div class="perr" id="perr"></div>
      <div class="phint" id="phint"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="s-main" class="scr">
  <div class="topbar">
    <div class="brand"><div class="brand-ico">N</div>NetManager</div>
    <div class="topright">
      <div class="sync-pill"><div class="sdot" id="sdot"></div><span id="slbl">...</span></div>
      <button class="icon-btn" onclick="lockApp()" title="Kunci">&#128274;</button>
      <button class="add-btn" onclick="openAdd()">+ Akun</button>
    </div>
  </div>
  <div class="wrap">
    <div class="sum-row" id="summary"></div>
    <div class="filter-row">
      <button class="ftab on" onclick="setF('semua',this)">Semua Akun</button>
      <button class="ftab" onclick="setF('aktif',this)">Masa Aktif</button>
      <button class="ftab" onclick="setF('expired',this)">Expired</button>
      <button class="ftab" onclick="setF('kosong',this)">Belum Diatur</button>
    </div>
    <div class="cards" id="cards"></div>
    <div class="empty" id="empty" style="display:none">Tidak ada akun ditemukan</div>
  </div>
</div>

<div id="mhost"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/firebase/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCifHEDd3iHUAxSd8PkBj02LAf-Z-f21BU",
  authDomain:"netflix-manager-c1fcd.firebaseapp.com",
  databaseURL:"https://netflix-manager-c1fcd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"netflix-manager-c1fcd",
  storageBucket:"netflix-manager-c1fcd.firebasestorage.app",
  messagingSenderId:"670235211618",
  appId:"1:670235211618:web:65b6f66de2a1e9e20a9e3b"
});
const db = firebase.database();

const PROF=['P1','P2','P3','P4','P5'], EXTRA=['S1','S2','S3'], ALL=[...PROF,...EXTRA];
let accounts={}, pinBuf='', setupPhase=0, pendingPin='', filt='semua', passVis={}, openPanels={};

const today=new Date(); today.setHours(0,0,0,0);
const pad2=n=>String(n).padStart(2,'0');
const todayStr=()=>`${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;
function dl(ds){if(!ds)return null;const d=new Date(ds);d.setHours(0,0,0,0);return Math.round((d-today)/86400000);}
function fmt(ds){if(!ds)return '—';const d=new Date(ds);return d.getDate()+' '+['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][d.getMonth()]+' '+d.getFullYear();}

function ssUI(s,l){const d=document.getElementById('sdot'),lb=document.getElementById('slbl');if(!d)return;d.className='sdot'+(s==='sync'?' sync':s==='err'?' err':'');lb.textContent=l;}

function startFB(){
  ssUI('sync','Memuat...');
  db.ref('accounts').on('value',snap=>{accounts=snap.val()||{};ssUI('ok','Real-time');renderAll();},()=>ssUI('err','Gagal'));
  db.ref('.info/connected').on('value',snap=>{if(snap.val())ssUI('ok','Real-time');else ssUI('err','Offline');});
}

async function initPIN(){
  ssUI('sync','Menghubungkan...');
  try{
    const s=await db.ref('config/pin').once('value');
    if(!s.val()){setupPhase=1;setLUI('Buat PIN Tim','Dibuat sekali oleh owner, berlaku untuk semua karyawan','PIN ini dipakai bersama seluruh tim');}
    else{setupPhase=0;setLUI('Masukkan PIN','Masukkan PIN 4 digit tim kamu','');}
    ssUI('ok','Tersambung');
  }catch(e){ssUI('err','Gagal');setLUI('Koneksi gagal','Periksa internet lalu refresh','');}
}
function setLUI(t,s,h){document.getElementById('lt').textContent=t;document.getElementById('ls').textContent=s;document.getElementById('phint').innerHTML=h?`<strong>${h}</strong>`:''; }
function pk(k){if(pinBuf.length>=4)return;pinBuf+=k;ud();if(pinBuf.length===4)setTimeout(subPIN,130);}
function pd(){pinBuf=pinBuf.slice(0,-1);ud();document.getElementById('perr').textContent='';}
function ud(){for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot'+(i<pinBuf.length?' on':'');}
async function subPIN(){
  if(setupPhase===1){pendingPin=pinBuf;pinBuf='';ud();setupPhase=2;setLUI('Konfirmasi PIN','Masukkan PIN yang sama lagi','');return;}
  if(setupPhase===2){
    if(pinBuf===pendingPin){await db.ref('config/pin').set(pinBuf);enterApp();}
    else{setupPhase=1;pendingPin='';pinBuf='';ud();pinErr('PIN tidak cocok, ulangi');setLUI('Buat PIN Tim','PIN tidak cocok, ulangi dari awal','');}
    return;
  }
  try{const s=await db.ref('config/pin').once('value');if(s.val()===pinBuf)enterApp();else{pinBuf='';ud();pinErr('PIN salah');}}
  catch(e){pinBuf='';ud();pinErr('Gagal, coba lagi');}
}
function pinErr(m){document.getElementById('perr').textContent=m;document.querySelectorAll('.dot').forEach(d=>{d.classList.add('sh');setTimeout(()=>d.classList.remove('sh'),350)});}
function enterApp(){document.getElementById('s-login').classList.remove('on');document.getElementById('s-main').classList.add('on');startFB();}
function lockApp(){pinBuf='';pendingPin='';setupPhase=0;ud();document.getElementById('perr').textContent='';document.getElementById('s-main').classList.remove('on');document.getElementById('s-login').classList.add('on');setLUI('Masukkan PIN','Masukkan PIN 4 digit tim kamu','');closeM();}

function accSt(acc){const d=dl(acc.masaAktif&&acc.masaAktif.sampai);if(d===null)return 'kosong';if(d<0)return 'expired';return 'aktif';}
function badgeHTML(s){if(s==='aktif')return`<span class="badge bok">&#9679; Aktif</span>`;if(s==='expired')return`<span class="badge bexp">&#9679; Expired</span>`;return`<span class="badge bmt">Belum diatur</span>`;}
function usedCnt(acc){return(acc.slots||[]).filter(s=>s.used).length;}

function sortedEntries(){
  return Object.entries(accounts).sort(([,a],[,b])=>{
    const order={aktif:0,expired:1,kosong:2};
    const sa=accSt(a),sb=accSt(b);
    if(order[sa]!==order[sb])return order[sa]-order[sb];
    const da=a.masaAktif&&a.masaAktif.sampai?new Date(a.masaAktif.sampai):new Date('9999-01-01');
    const db2=b.masaAktif&&b.masaAktif.sampai?new Date(b.masaAktif.sampai):new Date('9999-01-01');
    return da-db2;
  });
}

function renderSum(){
  const list=Object.values(accounts);
  const aktif=list.filter(a=>accSt(a)==='aktif').length;
  const exp=list.filter(a=>accSt(a)==='expired').length;
  const uc=list.reduce((s,a)=>s+usedCnt(a),0);
  const tc=list.reduce((s,a)=>s+(a.slots||[]).length,0);
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sc-l">Total Akun</div><div class="sc-v">${list.length}</div></div>
    <div class="sc"><div class="sc-l">Masa Aktif</div><div class="sc-v" style="color:var(--green)">${aktif}</div></div>
    <div class="sc"><div class="sc-l">Expired</div><div class="sc-v" style="color:#A32D2D">${exp}</div></div>
    <div class="sc"><div class="sc-l">Slot Terpakai</div><div class="sc-v">${uc}<span style="font-size:13px;color:var(--tx2)">/${tc}</span></div></div>`;
}

function miniBars(slots){return(slots||[]).map(s=>`<div class="mini-bar" style="height:${s.used?'14':'7'}px;background:${s.used?'#378ADD':'#D3D1C7'}"></div>`).join('');}

function maStrip(acc){
  const ma=acc.masaAktif||{};
  if(!ma.sampai)return`<div class="ma-strip"><span class="ma-l">Masa aktif</span><span class="ma-v" style="color:var(--tx3)">Belum diatur</span></div>`;
  const d=dl(ma.sampai);
  const cls=d<0?'red':d<=7?'amber':'green';
  const sisa=d<0?'Sudah berakhir':d===0?'Berakhir hari ini':`${d} hari lagi`;
  return`<div class="ma-strip"><span class="ma-l">Masa aktif</span><span class="ma-v ${cls}">${fmt(ma.dari)} – ${fmt(ma.sampai)} &nbsp;·&nbsp; <strong>${sisa}</strong></span></div>`;
}

function renderCards(){
  const entries=sortedEntries().filter(([,a])=>filt==='semua'||accSt(a)===filt);
  const grid=document.getElementById('cards');
  const empty=document.getElementById('empty');
  if(!entries.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=entries.map(([fid,acc])=>{
    const st=accSt(acc);
    const vis=passVis[fid];
    const safe=fid.replace(/[^a-zA-Z0-9]/g,'_');
    const slots=acc.slots||[];
    const uc=usedCnt(acc),tc=slots.length;
    const panOpen=openPanels[fid];
    const profHTML=slots.filter(s=>PROF.includes(s.name)).map(s=>`<div class="slot-item${s.used?' on':''}" onclick="toggleSlot('${fid}','${s.name}')"><div class="slot-check">${s.used?'&#10003;':''}</div><div class="slot-lbl">${s.name}</div></div>`).join('');
    const extraHTML=slots.filter(s=>EXTRA.includes(s.name)).map(s=>`<div class="slot-item${s.used?' on':''}" onclick="toggleSlot('${fid}','${s.name}')"><div class="slot-check">${s.used?'&#10003;':''}</div><div class="slot-lbl">${s.name}</div></div>`).join('');
    return`<div class="acard${st==='expired'?' expb':''}">
      <div class="card-top">
        <div class="card-head"><span class="card-id">${acc.id}</span>${badgeHTML(st)}</div>
        ${maStrip(acc)}
        <div class="cred"><span class="cred-t">${acc.email}</span></div>
        <div class="cred">
          <span class="cred-t cred-m" id="pw_${safe}">${vis?acc.pass:'••••••••••'}</span>
          <button class="eye-btn" onclick="toggleVis('${fid}')">${vis?'&#128584;':'&#128065;'}</button>
        </div>
        <button class="copy-btn" id="cb_${safe}" onclick="copyAll('${fid}','cb_${safe}')">&#128203; Salin Info Produk</button>
      </div>
      <div class="slot-toggle" onclick="togglePanel('${fid}')">
        <div class="stog-l">
          <div class="mini-bars">${miniBars(slots)}</div>
          <div class="stog-info"><div class="stog-t">${uc} / ${tc} slot digunakan</div><div class="stog-s">Ketuk untuk ${panOpen?'tutup':'lihat & ubah'} slot</div></div>
        </div>
        <span class="chevron${panOpen?' open':''}">&#9660;</span>
      </div>
      <div class="slot-panel${panOpen?' open':''}">
        <div class="slot-sep">Profil utama</div>
        <div class="slot-grid">${profHTML}</div>
        <div class="slot-sep">Slot ekstra</div>
        <div class="slot-grid">${extraHTML}</div>
      </div>
      <div class="card-actions">
        <button class="act" onclick="openEditMasa('${fid}')">&#128197; Edit Masa Aktif</button>
        <button class="act red" onclick="openDetail('${fid}')">Detail & Hapus</button>
      </div>
    </div>`;
  }).join('');
}

function renderAll(){renderSum();renderCards();}

function toggleSlot(fid,name){
  const acc=accounts[fid];if(!acc)return;
  const slots=acc.slots||[];
  const idx=slots.findIndex(s=>s.name===name);
  if(idx===-1)return;
  db.ref(`accounts/${fid}/slots/${idx}/used`).set(!slots[idx].used);
}
function togglePanel(fid){openPanels[fid]=!openPanels[fid];renderCards();}
function toggleVis(fid){passVis[fid]=!passVis[fid];renderCards();}
function setF(f,btn){filt=f;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderCards();}

function buildMsg(acc){return`Email: ${acc.email}\nPassword: ${acc.pass}\n\nProduk ini hanya berlaku 24 jam dari Info Produk dikirimkan ke Pembeli.`;}

function copyAll(fid,btnId){
  const acc=accounts[fid];if(!acc)return;
  const msg=buildMsg(acc);
  navigator.clipboard.writeText(msg).catch(()=>{const t=document.createElement('textarea');t.value=msg;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);});
  const btn=document.getElementById(btnId);
  if(btn){btn.innerHTML='&#10003; Tersalin!';btn.classList.add('ok');setTimeout(()=>{btn.innerHTML='&#128203; Salin Info Produk';btn.classList.remove('ok');},2000);}
  toast('Info produk tersalin!');
}

function openM(html){document.getElementById('mhost').innerHTML=`<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeM()">${html}</div>`;}
function closeM(){document.getElementById('mhost').innerHTML='';}

function openDetail(fid){
  const acc=accounts[fid];if(!acc)return;
  const ma=acc.masaAktif||{};
  const d=dl(ma.sampai);
  const sisa=d===null?'—':d<0?'Sudah berakhir':d===0?'Hari ini':d+' hari lagi';
  const sisaCls=d!==null&&d<0?'color:#A32D2D':d!==null&&d<=7?'color:var(--amber)':'color:var(--green)';
  const msg=buildMsg(acc);
  const safe=fid.replace(/[^a-zA-Z0-9]/g,'_');
  openM(`<div class="modal" onclick="event.stopPropagation()">
    <div class="mhead"><span class="mtitle">${acc.id} — Detail</span><button class="xcl" onclick="closeM()">&#10005;</button></div>
    <div class="det-row"><span class="det-l">Email</span><span class="det-v mono">${acc.email}</span></div>
    <div class="det-row"><span class="det-l">Password</span><span class="det-v mono">${acc.pass}</span></div>
    <div class="det-row"><span class="det-l">Aktif dari</span><span class="det-v">${fmt(ma.dari)}</span></div>
    <div class="det-row"><span class="det-l">Aktif sampai</span><span class="det-v">${fmt(ma.sampai)}</span></div>
    <div class="det-row"><span class="det-l">Sisa waktu</span><span class="det-v" style="${sisaCls}">${sisa}</span></div>
    <div class="det-row"><span class="det-l">Slot terpakai</span><span class="det-v">${usedCnt(acc)} / ${(acc.slots||[]).length}</span></div>
    <div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin:.9rem 0 .45rem">Pesan yang akan disalin</div>
    <div class="msg-box">${msg}</div>
    <button class="copy-msg" id="dcp_${safe}" onclick="copyAll('${fid}','dcp_${safe}')">&#128203; Salin Pesan</button>
    <div class="mfooter">
      <button class="mbtn danger" onclick="delAcc('${fid}')">Hapus</button>
      <button class="mbtn red" onclick="closeM()">Tutup</button>
    </div>
  </div>`);
}

function openEditMasa(fid){
  const acc=accounts[fid];if(!acc)return;
  const ma=acc.masaAktif||{};
  openM(`<div class="modal" onclick="event.stopPropagation()">
    <div class="mhead"><span class="mtitle">Masa Aktif — ${acc.id}</span><button class="xcl" onclick="closeM()">&#10005;</button></div>
    <div class="note">Tanggal billing akun Netflix ini. Digunakan untuk mengurutkan dan memfilter akun secara otomatis.</div>
    <div class="frow2">
      <div class="fg"><label class="flbl">Aktif dari</label><input class="finput" type="date" id="ma_d" value="${ma.dari||''}"></div>
      <div class="fg"><label class="flbl">Aktif sampai</label><input class="finput" type="date" id="ma_s" value="${ma.sampai||''}"></div>
    </div>
    <div class="mfooter">
      <button class="mbtn" onclick="closeM()">Batal</button>
      <button class="mbtn red" onclick="saveMasa('${fid}')">Simpan</button>
    </div>
  </div>`);
}
function saveMasa(fid){const dari=document.getElementById('ma_d').value,sampai=document.getElementById('ma_s').value;db.ref(`accounts/${fid}/masaAktif`).set({dari,sampai});closeM();toast('Masa aktif diperbarui');}
function delAcc(fid){if(!confirm('Hapus akun '+accounts[fid].id+'?'))return;db.ref('accounts/'+fid).remove();closeM();toast('Akun dihapus');}

function openAdd(){
  openM(`<div class="modal" onclick="event.stopPropagation()">
    <div class="mhead"><span class="mtitle">Tambah Akun Netflix</span><button class="xcl" onclick="closeM()">&#10005;</button></div>
    <div class="fg"><label class="flbl">Email akun Netflix</label><input class="finput" id="na_e" type="email" placeholder="netflixstore01@gmail.com" autocomplete="off"></div>
    <div class="frow2">
      <div class="fg"><label class="flbl">Password</label><input class="finput" id="na_p" type="text" placeholder="Password!" autocomplete="off"></div>
      <div class="fg"><label class="flbl">Kode Akun</label><input class="finput" id="na_l" type="text" placeholder="NF-06"></div>
    </div>
    <div class="frow2">
      <div class="fg"><label class="flbl">Masa aktif dari</label><input class="finput" id="na_d" type="date"></div>
      <div class="fg"><label class="flbl">Masa aktif sampai</label><input class="finput" id="na_s" type="date"></div>
    </div>
    <div class="note">Setiap akun memiliki <strong>5 profil utama (P1–P5) + 3 slot ekstra (S1–S3) = 8 slot total</strong>.</div>
    <div class="mfooter">
      <button class="mbtn" onclick="closeM()">Batal</button>
      <button class="mbtn red" onclick="saveAdd()">Tambahkan</button>
    </div>
  </div>`);
}
function saveAdd(){
  const email=document.getElementById('na_e').value.trim(),pass=document.getElementById('na_p').value.trim();
  if(!email||!pass){alert('Email dan password wajib diisi');return;}
  const id=document.getElementById('na_l').value.trim()||'NF-'+String(Object.keys(accounts).length+1).padStart(2,'0');
  const dari=document.getElementById('na_d').value,sampai=document.getElementById('na_s').value;
  const slots=ALL.map(n=>({name:n,used:false}));
  db.ref('accounts').push({id,email,pass,slots,masaAktif:{dari,sampai},order:Date.now()});
  closeM();toast('Akun '+id+' ditambahkan');
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

initPIN();
</script>
</body>
</html>
